<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYleet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    
        <div class="container">
            <h1>LeetMetric</h1>

            <div class="user-container"> 
                <p>Enter your UserName: </p>
                <div class="input-container">
                    
                    <input type="text" placeholder="enter here" id="inputbox">
                    <button id="submit-button" class="btn btn-secondary">Search</button>
                </div>
            </div>


            <div class="stats-container">
                <div class="progress">
                    <div class="progress-item">
                        <div class="easy-progress circle">
                            <span id="easy">0/0</span>
                            <small>Easy</small>
                        </div>
                    </div>

                    <div class="progress-item">
                        <div class="medium-progress circle">
                            <span id="medium">0/0</span>
                            <small>Medium</small>
                        </div>
                    </div>

                    <div class="progress-item">
                       <div class="hard-progress circle">
                            <span id="hard">0/0</span>
                            <small>Hard</small>
                       </div>
                    </div>
                </div>


                <div class="stats-card">

                </div>
            </div>

        </div>




    <script src="app.js"></script>
</body>
</html>
